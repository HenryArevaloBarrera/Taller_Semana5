<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería Especializada - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="coffee-icon">☕</span>
                <h2>Café Especial</h2>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item active">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="cafes.html" class="nav-item">
                    <span class="icon">🫘</span> Cafés
                </a>
                <a href="clientes.html" class="nav-item">
                    <span class="icon">👥</span> Clientes
                </a>
                <a href="pedidos.html" class="nav-item">
                    <span class="icon">📦</span> Pedidos
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Dashboard</h1>
                <div class="header-actions">
                    <span class="date" id="currentDate"></span>
                </div>
            </header>

            <!-- Stats Cards -->
            <div class="stats-grid" id="statsContainer">
                <div class="loading">Cargando estadísticas...</div>
            </div>

            <!-- Recent Activity -->
            <div class="recent-section">
                <h2>Pedidos Recientes</h2>
                <div class="table-container" id="recentPedidos">
                    <div class="loading">Cargando pedidos...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboard();
            loadRecentPedidos();
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-ES', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        });
    </script>
</body>
</html>
